{% load static %}
{# 傳入: book (OfficialBook), class (CSS) #}
{% if book.cover_image %}
    <img class="{{ class|default:'w-full h-full object-cover' }}"
         alt="{{ book.title }}"
         src="{{ book.cover_image.url }}" />
{% else %}
    <img class="{{ class|default:'w-full h-full object-cover' }}"
         alt="預設封面"
         src="{% static 'book-placeholder.jpg' %}" />
{% endif %}

{% comment %}
  Empty State Card
  通用的空狀態顯示（圖示 + 文字）
  Required context: icon (str), message (str)
  Optional context: subtitle (str)
{% endcomment %}
<div class="flex flex-col items-center justify-center p-8 py-16 w-full text-center">
    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-slate-100">
        <span class="material-symbols-outlined text-4xl text-slate-300 leading-none">{{ icon }}</span>
    </div>
    <h3 class="text-slate-600 font-medium text-base">{{ message }}</h3>
    {% if subtitle %}<p class="text-slate-400 text-sm mt-2 max-w-xs mx-auto">{{ subtitle }}</p>{% endif %}
</div>

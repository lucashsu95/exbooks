{% load static %}
{# 傳入: book (SharedBook), class (CSS) #}
{# 優先順序：官方封面 cover_image > 預設封面圖 #}
{% if book.official_book.cover_image %}
    <img class="{{ class|default:'w-full h-full object-cover' }}"
         alt="{{ book.official_book.title }}"
         src="{{ book.official_book.cover_image.url }}" />
{% else %}
    <img class="{{ class|default:'w-full h-full object-cover' }}"
         alt="預設封面"
         src="{% static 'book-placeholder.jpg' %}" />
{% endif %}

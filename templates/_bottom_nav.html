<!-- Bottom Navigation Bar - 手機版專用 -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 bg-white/95 backdrop-blur-md z-20 safe-area-pb">
    <div class="flex justify-around items-center h-16">
        <!-- 首頁 -->
        <a class="flex flex-col items-center justify-center min-w-[64px] min-h-[56px] gap-1 {% if request.resolver_match.url_name == 'list' and request.resolver_match.app_name == 'books' %}text-primary{% else %}text-slate-400{% endif %}"
           href="{% url 'books:list' %}">
            <span class="material-symbols-outlined text-2xl {% if request.resolver_match.url_name == 'list' and request.resolver_match.app_name == 'books' %}fill-1{% endif %}">home</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">首頁</span>
        </a>
        <!-- 書架 -->
        <a class="flex flex-col items-center justify-center min-w-[64px] min-h-[56px] gap-1 {% if request.resolver_match.url_name == 'bookshelf' %}text-primary{% else %}text-slate-400{% endif %}"
           href="{% url 'books:bookshelf' %}">
            <span class="material-symbols-outlined text-2xl {% if request.resolver_match.url_name == 'bookshelf' %}fill-1{% endif %}">auto_stories</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">書架</span>
        </a>
        <!-- 交易 -->
        <a class="flex flex-col items-center justify-center min-w-[64px] min-h-[56px] gap-1 relative {% if request.resolver_match.app_name == 'deals' %}text-primary{% else %}text-slate-400{% endif %}"
           href="{% url 'deals:list' %}">
            <span class="material-symbols-outlined text-2xl {% if request.resolver_match.app_name == 'deals' %}fill-1{% endif %}">swap_horiz</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">交易</span>
            <!-- 未讀通知 badge (由 HTMX 動態更新) -->
            {% if user.is_authenticated %}
                <span id="nav-notification-badge"
                      hx-get="{% url 'deals:notification_count' %}"
                      hx-trigger="load, every 30s"
                      hx-swap="innerHTML">
                    {% include 'deals/partials/notification_badge.html' with unread_count=0 %}
                </span>
            {% endif %}
        </a>
        <!-- 個人 -->
        <a class="flex flex-col items-center justify-center min-w-[64px] min-h-[56px] gap-1 {% if request.resolver_match.url_name == 'profile' and request.resolver_match.app_name == 'accounts' %}text-primary{% else %}text-slate-400{% endif %}"
           href="{% url 'accounts:profile' %}">
            <span class="material-symbols-outlined text-2xl {% if request.resolver_match.url_name == 'profile' and request.resolver_match.app_name == 'accounts' %}fill-1{% endif %}">person</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">個人</span>
        </a>
    </div>
</nav>
<style>
  /* Safe Area 支援 - iPhone X+ 全面屏適配 */
  .safe-area-pb {
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
</style>

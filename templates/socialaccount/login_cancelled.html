{% extends "base.html" %}
{% load i18n %}
{% block title %}
    {% trans "Login Cancelled" %} - Exbooks
{% endblock %}
{% block content %}
    <div class="min-h-[80vh] flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center">
            <div class="w-16 h-16 bg-slate-100 text-slate-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-3xl">cancel</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-4">{% trans "Login Cancelled" %}</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">
                {% trans "You decided to cancel logging in with your social network account." %}
            </p>
            <div class="pt-6 border-t border-slate-100">
                <a href="{% url 'account_login' %}"
                   class="w-full inline-block py-4 bg-primary text-white rounded-xl font-bold hover:bg-primary-hover transition-all">
                    {% trans "Back to Login" %}
                </a>
            </div>
        </div>
    </div>
{% endblock %}

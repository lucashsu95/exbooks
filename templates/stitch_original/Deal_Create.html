<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#136dec",
        "background-light": "#f6f7f8",
        "background-dark": "#101822",
      },
      fontFamily: {
        "display": ["Work Sans"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<title>Exbooks - 申請交易</title>
<style>
body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">

<!-- Top Navigation -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
  <a href="#" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
    <span class="material-symbols-outlined">arrow_back</span>
  </a>
  <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">申請交易</h2>
  <div class="flex w-12 items-center justify-end">
    <!-- Placeholder for symmetry -->
  </div>
</div>

<!-- Main Content -->
<main class="flex-1 px-4 py-4 pb-32">
  <!-- Book Info Card -->
  <div class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-800 p-4 mb-4">
    <div class="flex gap-4">
      <!-- Book Cover -->
      <div class="w-24 h-32 rounded-lg bg-slate-200 dark:bg-slate-700 overflow-hidden shrink-0 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAOxfy6jTXBa6HLVQwkBc3tJU7mRqE9wHSUD6CXWHc29IRsy1_4Sow75BoeL4-32sPLcBSpABaxY3iiFZrhrWiuKMEIOVacuKUVspevYR_-1catlhZjCK08dfkMOomhcXDN_3yCtROiUYhWDu7y5AvF-e2fcTUmEVTyuYZi0pnp9sKIaysN3J2Y515a2dur3SoaRPbTFh6LokFJVXTmlZtg7Jl3w19Xeur9E9hGnN2RsqhBHQewjLci32ArEMiUujVeBu13Yu1zZYs');">
      </div>
      <!-- Book Details -->
      <div class="flex-1 flex flex-col justify-center">
        <h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-1">大亨小傳</h3>
        <p class="text-slate-600 dark:text-slate-400 text-sm mb-2">F. Scott Fitzgerald</p>
        <div class="flex items-center gap-2">
          <span class="px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-xs font-bold">可流通</span>
          <span class="px-2 py-0.5 rounded-full bg-primary/10 text-primary text-xs font-bold">閱畢即還</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Keeper Info -->
  <div class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-800 p-4 mb-4 flex items-center gap-3">
    <div class="size-12 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border-2 border-primary">
      <img alt="持書人頭像" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZeXWrPxCBU69i-9JLnp1uVIwWZLWRGayrj3CtLPXX2Kil6F7Hg7SXT5LpNZYg4UubLUgUIZ9Z_T5Qb2AlXgtPbueQwzU7ePBtQA35WfXaiOdCLxwHlH0TjQE35k5gKoI2dtzNwBrjbTNrmAutrn5CMHIP_KblHFyEPUxdCBU1lMwT93tcDU3nswh1avusipC4fUR48yHPxj-ziw9paYNEKNWWugqVmcg77c5Gr5RjfhNSmLTxNz79TnYSknsTiPfLpndBkYtmuJU"/>
    </div>
    <div class="flex-1">
      <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold tracking-tighter">持書人</p>
      <p class="text-slate-900 dark:text-slate-100 font-bold">Alex Chen</p>
    </div>
    <div class="flex items-center gap-1 text-amber-500">
      <span class="material-symbols-outlined text-sm">star</span>
      <span class="text-sm font-bold">4.8</span>
    </div>
  </div>

  <!-- Deal Type Section -->
  <div class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-800 p-4 mb-4">
    <h4 class="text-slate-900 dark:text-slate-100 font-bold mb-3 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary">swap_horiz</span>
      交易類型
    </h4>
    <div class="bg-primary/10 dark:bg-primary/20 rounded-lg p-4">
      <div class="flex items-center gap-3">
        <div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
          <span class="material-symbols-outlined">auto_stories</span>
        </div>
        <div>
          <p class="text-slate-900 dark:text-slate-100 font-bold">借用交易 (LN)</p>
          <p class="text-slate-600 dark:text-slate-400 text-sm">借閱書籍，閱畢後歸還給持書人</p>
        </div>
      </div>
    </div>
    <!-- Deal Type Description -->
    <div class="mt-3 text-sm text-slate-600 dark:text-slate-400">
      <p class="flex items-center gap-2">
        <span class="material-symbols-outlined text-sm text-primary">info</span>
        預計借閱天數：30 天（可申請延長）
      </p>
    </div>
  </div>

  <!-- Note Section -->
  <div class="bg-white dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-800 p-4 mb-4">
    <h4 class="text-slate-900 dark:text-slate-100 font-bold mb-3 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary">edit_note</span>
      備註（選填）
    </h4>
    <textarea 
      class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-colors resize-none"
      rows="3"
      placeholder="可填寫面交時間地點或其他說明..."
    ></textarea>
  </div>

  <!-- Error Message Area (Hidden by default) -->
  <div class="hidden bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800 rounded-xl p-4 mb-4">
    <div class="flex items-center gap-2 text-rose-600 dark:text-rose-400">
      <span class="material-symbols-outlined">error</span>
      <p class="text-sm font-medium">錯誤訊息顯示區域</p>
    </div>
  </div>

  <!-- Info Box -->
  <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl p-4">
    <div class="flex items-start gap-3">
      <span class="material-symbols-outlined text-primary">info</span>
      <div>
        <h4 class="font-bold text-slate-900 dark:text-slate-100 text-sm mb-1">申請須知</h4>
        <ul class="text-sm text-slate-600 dark:text-slate-300 space-y-1 list-disc ml-4">
          <li>提交申請後，持書人將收到通知</li>
          <li>對方接受後，您可與持書人協商面交時間地點</li>
          <li>面交時請確認書況，並在系統中完成確認</li>
        </ul>
      </div>
    </div>
  </div>
</main>

<!-- Sticky Footer Actions -->
<div class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-t border-slate-200 dark:border-slate-800">
  <button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
    <span class="material-symbols-outlined">send</span>
    送出申請
  </button>
</div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#136dec",
        "background-light": "#f6f7f8",
        "background-dark": "#101822",
      },
      fontFamily: {
        "display": ["Work Sans"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<title>Exbooks - 交易管理</title>
<style>
body { min-height: max(884px, 100dvh); }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.active-tab { border-bottom: 3px solid #136dec; color: #136dec; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen pb-24">

<!-- Header -->
<header class="sticky top-0 z-10 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
  <div class="flex items-center p-4 justify-between max-w-xl mx-auto">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-slate-600 dark:text-slate-400 cursor-pointer">menu</span>
      <h1 class="text-xl font-bold tracking-tight">交易管理</h1>
    </div>
    <button type="button" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
      <span class="material-symbols-outlined">notifications</span>
    </button>
  </div>
  <!-- Tabs -->
  <div class="max-w-xl mx-auto overflow-x-auto no-scrollbar">
    <nav class="flex px-4 gap-6 whitespace-nowrap">
      <a class="flex flex-col items-center justify-center active-tab py-3 transition-colors" href="#">
        <span class="text-sm font-semibold">待回應</span>
        <span class="text-xs text-slate-500 dark:text-slate-400">2</span>
      </a>
      <a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 py-3 transition-colors hover:text-primary" href="#">
        <span class="text-sm font-semibold">待對方回應</span>
        <span class="text-xs text-slate-500 dark:text-slate-400">1</span>
      </a>
      <a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 py-3 transition-colors hover:text-primary" href="#">
        <span class="text-sm font-semibold">待面交</span>
        <span class="text-xs text-slate-500 dark:text-slate-400">0</span>
      </a>
      <a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 py-3 transition-colors hover:text-primary" href="#">
        <span class="text-sm font-semibold">待評價</span>
        <span class="text-xs text-slate-500 dark:text-slate-400">1</span>
      </a>
      <a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 py-3 transition-colors hover:text-primary" href="#">
        <span class="text-sm font-semibold">歷史</span>
      </a>
    </nav>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-xl mx-auto p-4 space-y-4">
  <!-- Section Header -->
  <div class="flex items-center justify-between mb-2">
    <p class="text-xs font-bold uppercase tracking-wider text-slate-500">需要您處理的申請</p>
    <span class="text-xs font-medium text-primary bg-primary/10 px-2 py-1 rounded-full">2 筆</span>
  </div>

  <!-- Deal Card 1: Pending Response -->
  <a href="#" class="block bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 hover:shadow-md transition-shadow">
    <div class="flex gap-4 items-center">
      <!-- Book Thumbnail -->
      <div class="w-16 h-20 bg-slate-200 dark:bg-slate-800 rounded-lg flex-shrink-0 bg-cover bg-center overflow-hidden" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAOxfy6jTXBa6HLVQwkBc3tJU7mRqE9wHSUD6CXWHc29IRsy1_4Sow75BoeL4-32sPLcBSpABaxY3iiFZrhrWiuKMEIOVacuKUVspevYR_-1catlhZjCK08dfkMOomhcXDN_3yCtROiUYhWDu7y5AvF-e2fcTUmEVTyuYZi0pnp9sKIaysN3J2Y515a2dur3SoaRPbTFh6LokFJVXTmlZtg7Jl3w19Xeur9E9hGnN2RsqhBHQewjLci32ArEMiUujVeBu13Yu1zZYs');">
      </div>
      <!-- Deal Info -->
      <div class="flex-1 min-w-0">
        <h3 class="font-bold text-base truncate">大亨小傳</h3>
        <div class="flex items-center gap-2 mt-1">
          <span class="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 text-xs font-bold">LN</span>
          <span class="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 text-xs font-bold">待回應</span>
        </div>
        <div class="flex items-center gap-2 mt-2">
          <div class="size-6 rounded-full bg-primary/20 overflow-hidden">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZeXWrPxCBU69i-9JLnp1uVIwWZLWRGayrj3CtLPXX2Kil6F7Hg7SXT5LpNZYg4UubLUgUIZ9Z_T5Qb2AlXgtPbueQwzU7ePBtQA35WfXaiOdCLxwHlH0TjQE35k5gKoI2dtzNwBrjbTNrmAutrn5CMHIP_KblHFyEPUxdCBU1lMwT93tcDU3nswh1avusipC4fUR48yHPxj-ziw9paYNEKNWWugqVmcg77c5Gr5RjfhNSmLTxNz79TnYSknsTiPfLpndBkYtmuJU" alt="申請者頭像" class="w-full h-full object-cover"/>
          </div>
          <span class="text-sm text-slate-600 dark:text-slate-400">王小明</span>
        </div>
      </div>
      <!-- Time -->
      <div class="text-right flex-shrink-0">
        <p class="text-xs text-slate-500 dark:text-slate-400">2 小時前</p>
        <span class="material-symbols-outlined text-slate-400 mt-2">chevron_right</span>
      </div>
    </div>
  </a>

  <!-- Deal Card 2: Pending Response -->
  <a href="#" class="block bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 hover:shadow-md transition-shadow">
    <div class="flex gap-4 items-center">
      <div class="w-16 h-20 bg-slate-200 dark:bg-slate-800 rounded-lg flex-shrink-0 bg-cover bg-center overflow-hidden" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCJKGFmDT9Y9sG2zd00enOq5IY1RlA1OMkGVx6ZhngS0yiBe_gffqVnF3SU7jYslPY5BSa1ucotaqAVvoRNJL5KR5caY89J1Cgrg0Qqhr1i_htBXL-M74fSsxxAOBREe-km7XJhk8eTcKA1AU36aT3cxkXi8D1UdhmoHeVi8G-c9fBNRqr4PFzQlaepN741GIaic-Y1cA6U49u00zOIaxoJGMnH0ytJ6s5L_eGH94J3-l9BHYLjCIXV_YrfyazMItU9aRWziAXoG1Y');">
      </div>
      <div class="flex-1 min-w-0">
        <h3 class="font-bold text-base truncate">原子習慣</h3>
        <div class="flex items-center gap-2 mt-1">
          <span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 text-xs font-bold">TF</span>
          <span class="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 text-xs font-bold">待回應</span>
        </div>
        <div class="flex items-center gap-2 mt-2">
          <div class="size-6 rounded-full bg-primary/20 overflow-hidden">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDojUq0WTv5D6pymWNmlhwK-83aMoYR_ktYitiw8gMAzHNLRukd2JeGRGRObPmU7qs6ntatuXtIWkZSPkNmnj6o0dqSY5ps1yHEdAlYAa6Mrti8lHR9VdWBpivLmjrr384ORVmlguT5ETC6h5EAr1J_X2C-gOgalH_WQY9LM7HutuuHT8U8y6Kyl9dwvCOLrhYEC4vwxqDzqwjex4n0j0k-KSoA9pGkrWYFA-5RtB7doscuo0r6K2HIZ5N4B2aVhMNBeksxQvEw-gI" alt="申請者頭像" class="w-full h-full object-cover"/>
          </div>
          <span class="text-sm text-slate-600 dark:text-slate-400">李美玲</span>
        </div>
      </div>
      <div class="text-right flex-shrink-0">
        <p class="text-xs text-slate-500 dark:text-slate-400">昨天</p>
        <span class="material-symbols-outlined text-slate-400 mt-2">chevron_right</span>
      </div>
    </div>
  </a>

  <!-- Empty State (Hidden - shown when no deals) -->
  <div class="hidden bg-white dark:bg-slate-900 rounded-xl p-8 text-center">
    <span class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-600 mb-4">inbox</span>
    <h3 class="text-slate-900 dark:text-slate-100 font-bold mb-2">尚無交易記錄</h3>
    <p class="text-slate-500 dark:text-slate-400 text-sm">您還沒有任何交易申請，快去探索書籍吧！</p>
    <button type="button" class="mt-4 bg-primary text-white font-bold py-3 px-6 rounded-xl">
      探索書籍
    </button>
  </div>
</main>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-20">
  <div class="flex justify-around items-center max-w-xl mx-auto h-16">
    <a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] font-medium">首頁</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
      <span class="material-symbols-outlined">search</span>
      <span class="text-[10px] font-medium">搜尋</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
      <span class="material-symbols-outlined">auto_stories</span>
      <span class="text-[10px] font-medium">書架</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-primary" href="#">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">handshake</span>
      <span class="text-[10px] font-medium">交易</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
      <span class="material-symbols-outlined">person</span>
      <span class="text-[10px] font-medium">個人</span>
    </a>
  </div>
</nav>

</body>
</html>

{% extends "base.html" %}
{% block title %}離線中 - Exbooks{% endblock %}
{% block content %}
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center min-h-[60vh]">
        <div class="size-20 rounded-full bg-slate-100 flex items-center justify-center mb-6">
            <span class="material-symbols-outlined text-4xl text-slate-400">wifi_off</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">您目前處於離線狀態</h1>
        <p class="text-slate-500 mb-8 max-w-sm">
            無法連接網路，請檢查您的網路設定。
            <br>
            網路恢復後，頁面將自動重新載入。
        </p>
        <button type="button"
                onclick="window.location.reload()"
                class="px-6 py-3 bg-primary text-white font-bold rounded-xl shadow-sm hover:bg-primary/90 transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">refresh</span>
            重新載入
        </button>
    </div>
{% endblock %}
{% block extra_js %}
    <script>
        window.addEventListener('online', () => {
            window.showToast('網路已恢復，正在重新載入...', 'success');
            setTimeout(() => {
                window.location.reload();
            }, 1500);
        });
    </script>
{% endblock %}

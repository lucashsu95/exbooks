{% if unread_count > 0 %}
    <span class="absolute -top-1 -right-1 size-5 bg-rose-500 text-white text-xs font-bold rounded-full flex items-center justify-center">
        {% if unread_count > 9 %}
            9+
        {% else %}
            {{ unread_count }}
        {% endif %}
    </span>
{% endif %}

{% with id=widget.attrs.id %}
    <div id="{{ id|escape }}" class="space-y-3 mt-2">
        {% for group, options, index in widget.optgroups %}
            {% for option in options %}
                <article class="book-selection-item">
                    <input type="checkbox"
                           name="{{ option.name|escape }}"
                           value="{{ option.value|escape }}"
                           {% if option.selected %}checked{% endif %}
                           {% for name, value in option.attrs.items %} {% if name != 'id' %}{{ name|escape }}="{{ value|escape }}"{% endif %}
                           {% endfor %}
                           id="{{ option.attrs.id|escape }}"
                           class="sr-only book-selection-input">
                    <label for="{{ option.attrs.id|escape }}" class="book-selection-card">
                        <!-- Checkbox replacement UI -->
                        <div class="selection-icon">
                            <span class="material-symbols-outlined text-sm font-bold">check</span>
                        </div>
                        <!-- Book Info with Thumbnail -->
                        <div class="flex gap-3 items-center flex-1 min-w-0">
                            <div class="w-12 h-16 bg-slate-100 rounded-lg flex-shrink-0 overflow-hidden shadow-sm border border-slate-200">
                                {% if option.book %}
                                    {% include 'partials/book_cover.html' with book=option.book %}
                                {% else %}
                                    <div class="w-full h-full flex items-center justify-center">
                                        <span class="material-symbols-outlined text-slate-300">book</span>
                                    </div>
                                {% endif %}
                            </div>
                            <div class="flex-1 min-w-0">
                                <span class="text-sm font-bold text-slate-900 block truncate">{{ option.label|escape }}</span>
                                {% if option.book %}
                                    <p class="text-xs text-slate-500 mt-0.5 truncate">{{ option.book.official_book.author|escape }}</p>
                                    <p class="text-[10px] text-slate-400 mt-0.5">{{ option.book.official_book.publisher|escape }}</p>
                                {% endif %}
                            </div>
                        </div>
                    </label>
                </article>
            {% endfor %}
        {% endfor %}
    </div>
{% endwith %}

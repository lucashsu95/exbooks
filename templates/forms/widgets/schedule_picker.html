<div x-data="schedulePicker{{ widget.name|capfirst }}()"
     x-init="initSchedule()">
    <!-- 時段列表 -->
    <div class="space-y-2 mb-3">
        <template x-for="(slot, index) in schedule" :key="index">
            <div class="flex items-center gap-2 bg-slate-50 rounded-lg p-3">
                <span class="text-sm font-medium text-slate-700"
                      x-text="getWeekdayName(slot.weekday)"></span>
                <span class="text-sm text-slate-500" x-text="slot.start + ' - ' + slot.end"></span>
                <button type="button"
                        @click="removeSlot(index)"
                        class="ml-auto text-rose-500 hover:text-rose-600">
                    <span class="material-symbols-outlined text-lg">delete</span>
                </button>
            </div>
        </template>
    </div>
    <!-- 新增時段 -->
    <div x-show="schedule.length < 14" class="bg-slate-50 rounded-lg p-3">
        <div class="grid grid-cols-3 gap-2 mb-2">
            <select x-model="newSlot.weekday"
                    class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="">選擇星期</option>
                <template x-for="(name, idx) in weekdays" :key="idx">
                    <option :value="idx" x-text="name"></option>
                </template>
            </select>
            <input type="time"
                   x-model="newSlot.start"
                   class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
            <input type="time"
                   x-model="newSlot.end"
                   class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm">
        </div>
        <button type="button"
                @click="addSlot()"
                :disabled="!newSlot.weekday || !newSlot.start || !newSlot.end"
                class="w-full bg-primary/10 text-primary text-sm font-medium py-2 rounded-lg hover:bg-primary/20 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            新增時段
        </button>
    </div>
    <!-- 隱藏欄位儲存 JSON -->
    <input type="hidden"
           name="{{ widget.name }}"
           :value="JSON.stringify(schedule)">
</div>
<script>
    function schedulePicker {
        {
            widget.name | capfirst
        }
    }() {
        return {
            schedule: {
                {
                    widget.value |
                        default: "[]" | safe
                }
            },
            weekdays: ['週日', '週一', '週二', '週三', '週四', '週五', '週六'],
            newSlot: {
                weekday: '',
                start: '09:00',
                end: '12:00'
            },
            initSchedule() {
                if (!Array.isArray(this.schedule)) {
                    this.schedule = [];
                }
            },
            getWeekdayName(day) {
                return this.weekdays[day] || '';
            },
            addSlot() {
                if (this.newSlot.weekday !== '' && this.newSlot.start && this.newSlot.end) {
                    this.schedule.push({
                        weekday: parseInt(this.newSlot.weekday),
                        start: this.newSlot.start,
                        end: this.newSlot.end
                    });
                    this.newSlot = {
                        weekday: '',
                        start: '09:00',
                        end: '12:00'
                    };
                }
            },
            removeSlot(index) {
                this.schedule.splice(index, 1);
            }
        };
    }
</script>

{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}建立套書 - Exbooks{% endblock %}
{% block content %}
    <!-- 隱藏底部導覽列以顯示建立按鈕 -->
    {% block bottom_nav %}{% endblock %}
    <!-- Sticky top bar -->
    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="flex items-center p-4 justify-between max-w-xl mx-auto">
            <nav class="flex items-center gap-3">
                <a href="{% url 'books:book_set_list' %}"
                   aria-label="返回"
                   class="flex size-10 items-center justify-center rounded-xl bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                </a>
                <h1 class="text-xl font-bold tracking-tight">建立套書</h1>
            </nav>
        </div>
    </header>
    <!-- Scrollable content -->
    <main class="px-4 py-4 pb-48 space-y-4">
        <form method="post" id="book-set-form" class="space-y-6">
            {% csrf_token %}
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">{% crispy form %}</div>
        </form>
    </main>
    <!-- Fixed bottom bar -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 safe-area-pb z-20">
        <button type="submit"
                form="book-set-form"
                class="w-full py-3.5 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-[0.98] transition-all">
            建立套書
        </button>
    </div>
{% endblock %}

{% comment %}
  分類 Pill 導覽列
  Required context: categories (list of (value, label)), current_category, search_query
{% endcomment %}
<div class="sticky top-[72px] z-10 py-3 bg-transparent">
    <div class="flex gap-2.5 overflow-x-auto no-scrollbar px-6 mask-edge py-1">
        <a href="?category=全部{% if search_query %}&q={{ search_query }}{% endif %}"
           hx-get="?category=全部{% if search_query %}&q={{ search_query }}{% endif %}"
           hx-target="#book-feed"
           hx-swap="outerHTML transition:true"
           hx-push-url="true"
           hx-indicator="#global-loader"
           class="category-pill flex-none h-10 px-6 rounded-full flex items-center justify-center text-sm font-bold touch-spring {% if current_category == '全部' %}active bg-primary text-white shadow-primary/30{% else %}bg-white text-slate-500 border border-slate-100{% endif %}">
            全部
        </a>
        {% for value, label in categories %}
            <a href="?category={{ value }}{% if search_query %}&q={{ search_query }}{% endif %}"
               hx-get="?category={{ value }}{% if search_query %}&q={{ search_query }}{% endif %}"
               hx-target="#book-feed"
               hx-swap="outerHTML transition:true"
               hx-push-url="true"
               hx-indicator="#global-loader"
               class="category-pill flex-none h-10 px-6 rounded-full flex items-center justify-center text-sm font-bold touch-spring {% if current_category == value %}active bg-primary text-white shadow-primary/30{% else %}bg-white text-slate-500 border border-slate-100{% endif %}">
                {{ label }}
            </a>
        {% endfor %}
    </div>
</div>

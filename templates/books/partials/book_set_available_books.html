<!-- 可加入的書籍列表 -->
<div id="book-set-available-books"
     hx-swap-oob="true"
     class="divide-y divide-slate-100">
    {% if available_books %}
        {% for book in available_books %}
            <div class="flex justify-between items-center p-4">
                <div class="flex-1 min-w-0 pr-4">
                    <span class="text-base font-semibold text-slate-900 block truncate mb-1">{{ book.official_book.title }}</span>
                    <p class="text-sm text-slate-500 truncate">{{ book.official_book.author }}</p>
                </div>
                <button type="button"
                        hx-post="{% url 'books:book_set_add_book' book_set.pk %}"
                        hx-vals='{"book_id": "{{ book.pk }}"}'
                        hx-target="#book-set-books"
                        hx-swap="outerHTML"
                        class="text-primary hover:text-primary/80 hover:bg-primary/5 p-2 rounded-lg text-sm font-medium transition-colors shrink-0 flex items-center gap-1">
                    <span class="material-symbols-outlined text-xl">add</span>
                    加入
                </button>
            </div>
        {% endfor %}
    {% else %}
        <div class="p-8 text-center text-slate-500">
            <span class="material-symbols-outlined text-3xl mb-2 text-slate-300">inbox</span>
            <p class="text-sm">沒有其他可加入的書籍</p>
        </div>
    {% endif %}
</div>

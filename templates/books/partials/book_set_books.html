{% load crispy_forms_tags %}
<div class="space-y-3" id="book-set-books">
    {% for book in books %}
        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg">
            <div>
                <a href="{% url 'books:detail' book.pk %}"
                   class="text-slate-900 hover:text-primary">{{ book.official_book.title }}</a>
                <p class="text-sm text-slate-500">{{ book.official_book.author }}</p>
            </div>
            <button type="button"
                    hx-post="{% url 'books:book_set_remove_book' book_set.pk book.pk %}"
                    hx-target="#book-set-books"
                    hx-swap="outerHTML"
                    class="text-red-600 hover:text-red-800 text-sm">移除</button>
        </div>
    {% empty %}
        <div class="text-slate-600 text-center py-8">
            <p>此套書尚未加入任何書籍</p>
        </div>
    {% endfor %}
</div>

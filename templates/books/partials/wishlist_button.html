{% if in_wishlist %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            class="w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-primary/30 text-primary font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-300 hover:bg-primary/10 hover:border-primary">
        <span class="material-symbols-outlined fill-1">favorite</span>
        已加入願望清單
    </button>
{% else %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            class="w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-primary/30 text-primary font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-300 hover:bg-primary/10 hover:border-primary">
        <span class="material-symbols-outlined">favorite</span>
        加入願望清單
    </button>
{% endif %}

{% if in_wishlist %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            aria-label="從願望清單移除"
            class="w-full bg-white/80 backdrop-blur-md border border-primary/30 text-primary font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-300 hover:bg-primary/10 hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
        <span class="material-symbols-outlined fill-1" aria-hidden="true">favorite</span>
        已加入願望清單
    </button>
{% else %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            aria-label="加入願望清單"
            class="w-full bg-white/80 backdrop-blur-md border border-primary/30 text-primary font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-300 hover:bg-primary/10 hover:border-primary focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
        <span class="material-symbols-outlined" aria-hidden="true">favorite</span>
        加入願望清單
    </button>
{% endif %}

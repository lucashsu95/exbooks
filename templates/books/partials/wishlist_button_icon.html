{% if in_wishlist %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            aria-label="從願望清單移除"
            class="flex size-10 items-center justify-center rounded-xl bg-rose-50 text-rose-500 shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-rose-400">
        <span class="material-symbols-outlined fill-1 text-xl" aria-hidden="true">favorite</span>
    </button>
{% else %}
    <button type="button"
            hx-post="{% url 'books:wishlist_toggle' official_book.id %}"
            hx-target="this"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            aria-label="加入願望清單"
            class="flex size-10 items-center justify-center rounded-xl bg-white/60 backdrop-blur-md text-slate-400 shadow-lg hover:shadow-xl hover:scale-105 hover:text-rose-400 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-rose-400">
        <span class="material-symbols-outlined text-xl" aria-hidden="true">favorite</span>
    </button>
{% endif %}

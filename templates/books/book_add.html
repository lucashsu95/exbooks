{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Exbooks - 新增書籍{% endblock %}

{% block content %}
<!-- Header -->
<header class="sticky top-0 z-10 bg-white border-b border-slate-200">
  <div class="flex items-center p-4 justify-between max-w-xl mx-auto">
    <div class="flex items-center gap-3">
      <a href="{% url 'books:bookshelf' %}" class="material-symbols-outlined text-slate-600 cursor-pointer">arrow_back</a>
      <h1 class="text-xl font-bold tracking-tight">新增分享書籍</h1>
    </div>
  </div>
</header>

<main class="max-w-xl mx-auto p-4 pb-24">
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}

    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
      {% crispy form %}
      <div id="isbn-result"></div>
      <span class="htmx-indicator text-sm text-slate-500">查詢中...</span>
      <div id="photo-preview" class="grid grid-cols-3 gap-2 mt-3"></div>
    </div>

    <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-transform">
      確認新增
    </button>
  </form>
</main>

{% include '_bottom_nav.html' %}
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  var photoInput = document.querySelector('input[name="photos"]');
  var previewContainer = document.getElementById('photo-preview');
  if (photoInput && previewContainer) {
    photoInput.addEventListener('change', function(e) {
      previewContainer.innerHTML = '';
      var files = Array.from(e.target.files);
      files.forEach(function(file) {
        if (file.type.startsWith('image/')) {
          var reader = new FileReader();
          reader.onload = function(event) {
            var div = document.createElement('div');
            div.className = 'relative';
            div.innerHTML = '<img src="' + event.target.result + '" class="w-full h-24 object-cover rounded-lg">';
            previewContainer.appendChild(div);
          };
          reader.readAsDataURL(file);
        }
      });
    });
  }
});
</script>
{% endblock %}

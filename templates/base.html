<style>
body {
  min-height: max(884px, 100dvh);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* Safe Area 變數 - iPhone X+ 全面屏適配 */
:root {
  --safe-area-inset-top: env(safe-area-inset-top, 0px);
  --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
  --safe-area-inset-left: env(safe-area-inset-left, 0px);
  --safe-area-inset-right: env(safe-area-inset-right, 0px);
}

/* Safe Area padding classes */
.safe-area-pb {
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}

.safe-area-pt {
  padding-top: max(12px, env(safe-area-inset-top));
}

/* HTMX loading indicator */
.htmx-indicator { opacity: 0; transition: opacity 300ms ease-in; }
.htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

/* Page transition */
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Toast auto-dismiss */
.toast { animation: toastIn 0.4s ease-out, toastOut 0.4s ease-in 4s forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-12px); } }

/* Hide scrollbar for horizontal scrolling */
.no-scrollbar::-webkit-scrollbar {
  display: none;
}
.no-scrollbar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.fill-1 {
  font-variation-settings: 'FILL' 1;
}

/* Screen reader only - 無障礙輔助 */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Overscroll containment for modals */
.overscroll-contain {
  overscroll-behavior: contain;
}

/* Prefers reduced motion - 尊重使用者減少動態偏好 */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  
  .toast {
    animation: none;
  }
  
  .fade-in {
    animation: none;
  }
}
</style>
        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-background-light-background-dark font-display text-slate-900"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <!-- PWA Service Worker & Push Registration -->
        <script>
(function() {
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async function() {
      try {
        // 註冊 Service Worker
        const registration = await navigator.serviceWorker.register('/static/sw.js');
        console.log('[PWA] Service Worker 註冊成功:', registration.scope);

        // 檢查是否支援 Push
        if (!('PushManager' in window)) {
          console.log('[PWA] 此瀏覽器不支援 Push 通知');
          return;
        }

        // 檢查是否已登入（透過檢查是否有登入後才有的元素）
        {% if user.is_authenticated %}
        await initPushNotifications(registration);
        {% endif %}
      } catch (error) {
        console.log('[PWA] Service Worker 註冊失敗:', error);
      }
    });
  }

  {% if user.is_authenticated %}
  async function initPushNotifications(registration) {
    try {
      // 取得 VAPID 公開金鑰
      const response = await fetch('/deals/push/vapid-public-key/');
      if (!response.ok) {
        console.log('[PWA] 無法取得 VAPID 金鑰，Web Push 尚未設定');
        return;
      }
      const data = await response.json();
      const publicKey = data.publicKey;

      // 將 base64 轉換為 Uint8Array
      const applicationServerKey = urlBase64ToUint8Array(publicKey);

      // 檢查目前的訂閱狀態
      let subscription = await registration.pushManager.getSubscription();

      if (subscription === null) {
        // 沒有現有訂閱，詢問用戶是否要啟用通知
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          console.log('[PWA] 用戶拒絕通知權限');
          return;
        }

        // 訂閱 Push
        subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: applicationServerKey
        });
        console.log('[PWA] Push 訂閱成功:', subscription.endpoint);

        // 將訂閱資訊發送到後端
        await sendSubscriptionToServer(subscription);
      } else {
        console.log('[PWA] 已有 Push 訂閱:', subscription.endpoint);
        // 確保後端有此訂閱的記錄
        await sendSubscriptionToServer(subscription);
      }
    } catch (error) {
      console.error('[PWA] Push 初始化失敗:', error);
    }
  }

  async function sendSubscriptionToServer(subscription) {
    try {
      const response = await fetch('/deals/push/subscribe/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
          subscription: subscription.toJSON()
        })
      });

      if (response.ok) {
        const data = await response.json();
        console.log('[PWA] 訂閱已同步到伺服器:', data.message);
      } else {
        console.error('[PWA] 同步訂閱到伺服器失敗');
      }
    } catch (error) {
      console.error('[PWA] 發送訂閱到伺服器失敗:', error);
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding)
      .replace(/-/g, '+')
      .replace(/_/g, '/');

    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);

    for (let i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }
  {% endif %}
})();
        </script>
        <!-- Global Loading Indicator - 頁面頂部進度條 -->
        <div id="global-loader"
             class="fixed top-0 left-0 right-0 h-1 z-[100] opacity-0 transition-opacity duration-200 pointer-events-none">
            <div id="global-loader-bar"
                 class="h-full bg-primary transition-all duration-300"
                 style="width: 0%"></div>
        </div>
        <!-- Search Modal -->
        {% include '_search_modal.html' %}
        <!-- Messages (Toast) - Safe Area 適配 -->
        {% if messages %}
            <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 toast-safe"
                 id="toast-container">
                {% for message in messages %}
                    <div class="toast rounded-lg border px-4 py-3 text-sm shadow-md {% if message.tags == 'success' %}border-green-200 bg-green-50 text-green-800 {% elif message.tags == 'error' %}border-red-200 bg-red-50 text-red-800 {% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-800 {% else %}border-blue-200 bg-blue-50 text-blue-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            <style>
            .toast-safe {
                top: max(16px, env(safe-area-inset-top, 0px));
                right: max(16px, env(safe-area-inset-right, 0px));
            }
            </style>
        {% endif %}
        <!-- Main Content Wrapper -->
        <div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light-background-dark overflow-x-hidden fade-in">
            {% block content %}{% endblock %}
        </div>

        <!-- Global Loading Indicator & Virtual Keyboard Handling -->
        <script>
(function() {
  // === 方案 C: 全域 Loading Indicator ===
  const globalLoader = document.getElementById('global-loader');
  const globalLoaderBar = document.getElementById('global-loader-bar');
  let loadingProgress = 0;
  let loadingInterval = null;

  function startLoading() {
    if (!globalLoader) return;
    globalLoader.style.opacity = '1';
    loadingProgress = 0;
    globalLoaderBar.style.width = '0%';
    
    // 模擬進度動畫
    loadingInterval = setInterval(() => {
      loadingProgress += Math.random() * 15;
      if (loadingProgress > 90) loadingProgress = 90;
      globalLoaderBar.style.width = loadingProgress + '%';
    }, 100);
  }

  function stopLoading() {
    if (!globalLoader) return;
    clearInterval(loadingInterval);
    globalLoaderBar.style.width = '100%';
    setTimeout(() => {
      globalLoader.style.opacity = '0';
      setTimeout(() => {
        globalLoaderBar.style.width = '0%';
      }, 200);
    }, 150);
  }

  // HTMX 事件監聽
  document.body.addEventListener('htmx:beforeRequest', startLoading);
  document.body.addEventListener('htmx:afterRequest', stopLoading);
  document.body.addEventListener('htmx:beforeSwap', stopLoading);

  // === 方案 D: 虛擬鍵盝處理 ===
  if (window.visualViewport) {
    let originalHeight = document.body.style.height;
    
    window.visualViewport.addEventListener('resize', () => {
      // 調整 body 高度以適應虛擬鍵盝
      document.body.style.height = `${window.visualViewport.height}px`;
      
      // 將焦點元素滾動到可見區域
      const activeElement = document.activeElement;
      if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) {
        setTimeout(() => {
          activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    });

    // 鍵盝關閉時恢復原始高度
    window.visualViewport.addEventListener('scroll', () => {
      if (window.visualViewport.height === window.innerHeight) {
        document.body.style.height = originalHeight || '';
      }
    });
  }

  // 傳統瀏覽器的備用方案
  window.addEventListener('resize', () => {
    if (!window.visualViewport) {
      const activeElement = document.activeElement;
      if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) {
        setTimeout(() => {
          activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }
  });
})();
        </script>

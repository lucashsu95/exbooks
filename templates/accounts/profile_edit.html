{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Exbooks - 編輯個人資料{% endblock %}

{% block content %}
<!-- Header -->
<header class="sticky top-0 z-10 bg-white border-b border-slate-200">
  <div class="flex items-center p-4 justify-between max-w-xl mx-auto">
    <div class="flex items-center gap-3">
      <a href="{% url 'accounts:profile' %}" class="material-symbols-outlined text-slate-600 cursor-pointer">arrow_back</a>
      <h1 class="text-xl font-bold tracking-tight">編輯個人資料</h1>
    </div>
  </div>
</header>

<main class="max-w-xl mx-auto p-4 pb-24">
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {% crispy form %}
  </form>
</main>

{% include '_bottom_nav.html' %}
{% endblock %}

<!-- Search Modal Overlay - 使用 button 以支援鍵盤互動 -->
<button type="button"
        id="search-modal-overlay"
        aria-label="關閉搜尋"
        class="fixed inset-0 bg-black/50 z-50 opacity-0 pointer-events-none transition-opacity duration-300 cursor-default"
        onclick="toggleSearchModal()"></button>
<!-- Search Modal - 從底部滑入（手機版友善設計）- 使用 aside 語義標籤 -->
<aside id="search-modal"
       role="dialog"
       aria-modal="true"
       aria-label="搜尋書籍"
       class="fixed bottom-0 left-0 right-0 z-50 transform translate-y-full transition-transform duration-300 ease-out safe-area-pb overscroll-contain">
  <div class="bg-white rounded-t-3xl shadow-2xl max-h-[90vh] overflow-hidden">
    <!-- Drag Indicator（可拖曳指示器）- 裝飾性 -->
    <div class="flex justify-center pt-3 pb-2" aria-hidden="true">
      <div class="w-10 h-1 bg-slate-300 rounded-full"></div>
    </div>
    <!-- Modal Header - 使用 header 語義標籤 -->
    <header class="flex items-center px-4 pb-3 gap-3">
      <button type="button"
              onclick="toggleSearchModal()"
              aria-label="關閉搜尋"
              class="p-2 -ml-2 rounded-full hover:bg-slate-100 active:bg-slate-200 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
        <span class="material-symbols-outlined text-slate-500" aria-hidden="true">close</span>
      </button>
      <!-- Search Form with HTMX 即時搜尋 -->
      <form method="GET"
            action="{% url 'books:list' %}"
            class="flex-1"
            hx-get="{% url 'books:list' %}"
            hx-trigger="input changed delay:300ms, search"
            hx-target="#search-results"
            hx-indicator="#search-loading"
            hx-push-url="false"
            hx-include="[name='category']"
            role="search">
        <div class="flex items-center bg-slate-100 rounded-2xl">
          <span class="material-symbols-outlined text-slate-400 pl-4" aria-hidden="true">search</span>
          <label for="search-modal-input" class="sr-only">搜尋書籍</label>
          <input type="text"
                 name="q"
                 id="search-modal-input"
                 aria-label="搜尋 ISBN、書名、作者"
                 class="w-full bg-transparent border-none focus:ring-0 px-3 py-3 text-slate-900 placeholder:text-slate-400"
                 placeholder="搜尋 ISBN、書名、作者…"
                 autocomplete="off"
                 hx-sync="true">
          <button type="submit"
                  class="px-4 py-3 text-primary hover:bg-primary/10 rounded-r-2xl transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
            搜尋
          </button>
        </div>
      </form>
    </header>
    <!-- Search Results Area（即時搜尋結果）- 使用 section -->
    <section id="search-results"
             class="px-4 pb-4 max-h-[60vh] overflow-y-auto overscroll-contain"
             aria-label="搜尋結果"
             aria-live="polite">
      <!-- Loading Indicator -->
      <div id="search-loading" class="htmx-indicator flex justify-center py-8">
        <span class="material-symbols-outlined animate-spin text-primary text-3xl" aria-hidden="true">sync</span>
        <span class="sr-only">載入中…</span>
      </div>
      <!-- Initial State - 搜尋提示 -->
      <div id="search-initial" class="py-8 text-center">
        <span class="material-symbols-outlined text-slate-300 text-5xl mb-3" aria-hidden="true">search</span>
        <p class="text-sm text-slate-500">輸入關鍵字搜尋書籍</p>
        <p class="text-xs text-slate-400 mt-2">支援書名、作者、ISBN</p>
      </div>
    </section>
  </div>
</aside>
<script>
function toggleSearchModal() {
  const modal = document.getElementById('search-modal');
  const overlay = document.getElementById('search-modal-overlay');

  if (modal.classList.contains('translate-y-full')) {
    // Open modal - slide up from bottom
    modal.classList.remove('translate-y-full');
    modal.classList.add('translate-y-0');
    overlay.classList.remove('opacity-0', 'pointer-events-none');
    overlay.classList.add('opacity-100', 'pointer-events-auto');
    document.body.style.overflow = 'hidden';

    // Auto-focus input
    setTimeout(() => {
      document.getElementById('search-modal-input').focus();
    }, 100);
  } else {
    // Close modal - slide down
    modal.classList.remove('translate-y-0');
    modal.classList.add('translate-y-full');
    overlay.classList.remove('opacity-100', 'pointer-events-auto');
    overlay.classList.add('opacity-0', 'pointer-events-none');
    document.body.style.overflow = '';

    // Clear search input
    document.getElementById('search-modal-input').value = '';
  }
}

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const modal = document.getElementById('search-modal');
    if (!modal.classList.contains('translate-y-full')) {
      toggleSearchModal();
    }
  }
});

// === 方案 E：下拉刷新 ===
(function() {
  let startY = 0;
  let pulling = false;
  let pullDistance = 0;
  const threshold = 80; // 觸發刷新的距離

  // 建立刷新指示器
  const pullIndicator = document.createElement('div');
  pullIndicator.id = 'pull-refresh-indicator';
  pullIndicator.className = 'fixed top-0 left-0 right-0 flex justify-center items-center py-4 z-40 opacity-0 transition-opacity duration-200 pointer-events-none';
  pullIndicator.setAttribute('aria-hidden', 'true');
  pullIndicator.innerHTML = '<span class="material-symbols-outlined animate-spin text-primary text-2xl">sync</span>';
  document.body.appendChild(pullIndicator);

  document.addEventListener('touchstart', function(e) {
    // 只有在頁面頂部才啟用下拉刷新
    if (window.scrollY === 0) {
      startY = e.touches[0].pageY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;

    pullDistance = e.touches[0].pageY - startY;

    // 只有向下拉才顯示
    if (pullDistance > 0) {
      pullIndicator.style.opacity = Math.min(pullDistance / threshold, 1);
      pullIndicator.style.transform = `translateY(${Math.min(pullDistance * 0.5, 40)}px)`;
    }
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (pulling) {
      // 超過閾值則刷新
      if (pullDistance > threshold) {
        pullIndicator.querySelector('.material-symbols-outlined').classList.add('animate-spin');
        setTimeout(() => {
          location.reload();
        }, 200);
      } else {
        // 重置指示器
        pullIndicator.style.opacity = '0';
        pullIndicator.style.transform = 'translateY(0)';
      }
    }
    pulling = false;
    pullDistance = 0;
  }, { passive: true });
})();
</script>

<div x-data="chatWidget()" 
     x-init="init()" 
     class="fixed bottom-6 right-6 z-50 font-sans">
    
    <!-- Chat Toggle Button -->
    <button @click="toggleChat()" 
            :class="isOpen ? 'bg-gray-200 text-gray-700' : 'bg-indigo-600 text-white'"
            class="p-4 rounded-full shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 flex items-center justify-center group">
        <template x-if="!isOpen">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
        </template>
        <template x-if="isOpen">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </template>
    </button>

    <!-- Chat Window -->
    <div x-show="isOpen" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-10 scale-95"
         class="absolute bottom-20 right-0 w-full max-w-[400px] h-[600px] bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden"
         style="display: none;">
        
        <!-- Header -->
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-indigo-400 rounded-full flex items-center justify-center text-xl font-bold">AI</div>
                    <div :class="isConnected ? 'bg-green-400' : 'bg-gray-400'" class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <h3 class="font-semibold leading-tight">Exbooks Assistant</h3>
                    <p class="text-xs text-indigo-100" x-text="connectionStatus"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="clearHistory()" class="p-2 hover:bg-indigo-500 rounded-lg transition-colors" title="Clear History">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <button @click="toggleChat()" class="p-2 hover:bg-indigo-500 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" 
             class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"
             x-ref="messageContainer">
            
            <template x-for="(msg, index) in messages" :key="index">
                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                    <div :class="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-l-xl rounded-tr-xl' : 'bg-white text-gray-800 border border-gray-200 rounded-r-xl rounded-tl-xl'"
                         class="max-w-[80%] p-3 shadow-sm text-sm leading-relaxed">
                        <div x-html="msg.content"></div>
                        
                        <!-- Consent Action -->
                        <template x-if="msg.type === 'consent'">
                            <div class="mt-3 flex gap-2">
                                <button @click="sendAction('confirm')" 
                                        class="px-3 py-1 bg-green-500 text-white rounded-md text-xs font-medium hover:bg-green-600 transition-colors">
                                    Confirm
                                </button>
                                <button @click="sendAction('cancel')" 
                                        class="px-3 py-1 bg-gray-400 text-white rounded-md text-xs font-medium hover:bg-gray-500 transition-colors">
                                    Cancel
                                </button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Typing Indicator -->
            <template x-if="isTyping">
                <div class="flex justify-start">
                    <div class="bg-white border border-gray-200 rounded-r-xl rounded-tl-xl p-3 shadow-sm">
                        <div class="flex gap-1">
                            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-100">
            <form @submit.prevent="sendMessage()" class="flex gap-2">
                <input type="text" 
                       x-model="userInput" 
                       :disabled="!isConnected || isTyping"
                       placeholder="Ask me anything..." 
                       class="flex-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm transition-all disabled:bg-gray-100 disabled:cursor-not-allowed">
                <button type="submit" 
                        :disabled="!userInput.trim() || !isConnected || isTyping"
                        class="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function chatWidget() {
    return {
        isOpen: false,
        isConnected: false,
        connectionStatus: 'Disconnected',
        userInput: '',
        messages: [],
        isTyping: false,
        eventSource: null,

        init() {
            this.loadHistory();
            this.connectSSE();
        },

        toggleChat() {
            this.isOpen = !this.isOpen;
            if (this.isOpen && !this.eventSource) {
                this.connectSSE();
            }
        },

        connectSSE() {
            this.connectionStatus = 'Connecting...';
            this.eventSource = new EventSource('/ai/chat/sse/');

            this.eventSource.addEventListener('connected', (e) => {
                this.isConnected = true;
                this.connectionStatus = 'Online';
                this.addMessage('assistant', 'Hello! How can I help you today?');
            });

            this.eventSource.addEventListener('status', (e) => {
                const data = JSON.parse(e.data);
                this.connectionStatus = data.status;
            });

            this.eventSource.addEventListener('message', (e) => {
                const data = JSON.parse(e.data);
                this.isTyping = data.status === 'typing';
                if (data.content) {
                    this.addMessage('assistant', data.content, data.type);
                }
            });

            this.eventSource.addEventListener('consent_required', (e) => {
                const data = JSON.parse(e.data);
                this.addMessage('assistant', data.content, 'consent');
            });

            this.eventSource.addEventListener('error', (e) => {
                this.isConnected = false;
                this.connectionStatus = 'Connection Error';
                console.error('SSE Error:', e);
            });

            this.eventSource.addEventListener('done', () => {
                this.isTyping = false;
            });
        },

        async sendMessage() {
            if (!this.userInput.trim()) return;

            const text = this.userInput;
            this.addMessage('user', text);
            this.userInput = '';
            this.isTyping = true;

            try {
                const response = await fetch('/ai/chat/send/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCookie('csrftoken')
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error('Failed to send message');
            } catch (error) {
                this.addMessage('assistant', 'Sorry, I encountered an error sending your message.');
                this.isTyping = false;
            }
        },

        async sendAction(action) {
            try {
                const response = await fetch('/ai/chat/action/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCookie('csrftoken')
                    },
                    body: JSON.stringify({ action: action })
                });
                if (!response.ok) throw new Error('Action failed');
                this.addMessage('user', action === 'confirm' ? 'Confirmed' : 'Cancelled');
            } catch (error) {
                this.addMessage('assistant', 'Error processing your action.');
            }
        },

        addMessage(role, content, type = 'text') {
            this.messages.push({ role, content, type });
            this.$nextTick(() => {
                const container = this.$refs.messageContainer;
                container.scrollTop = container.scrollHeight;
            });
        },

        clearHistory() {
            this.messages = [];
            localStorage.removeItem('chat_history');
        },

        loadHistory() {
            const history = localStorage.getItem('chat_history');
            if (history) {
                this.messages = JSON.parse(history);
            }
        },

        getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    }
}
</script>
